code_review:
  path_instructions:
    - glob: "skills/**"
      instructions: |
        When reviewing changes to skills, evaluate them against these quality criteria:

        ## Frontmatter
        - `name`: letters, numbers, hyphens only; max 64 chars
        - `description`: third-person, max 1024 chars; describe what it does and when to
          use it including keywords for agent matching; do NOT summarize the workflow;
          err toward over-triggering rather than under-triggering; good descriptions
          include explicit TRIGGER WHEN and SYMPTOMS sections listing observable agent
          behaviors that signal the skill is needed
        - `metadata.version`: semver (e.g. "1.0.0"); must be bumped in every PR that
          changes skill content — CI enforces this

        ## Structure
        - SKILL.md must stay under 500 lines
        - Optional subdirs: references/ (docs), scripts/ (utilities), assets/ (static files)
        - Reference files must be one level deep only (e.g. references/example.yaml)
        - Use forward slashes in all file paths

        ## Content quality
        - Include only domain-specific knowledge agents lack; omit general programming advice
        - Provide patterns and quick-reference tables, not tutorials
        - One term per concept throughout (consistent terminology)
        - Explain the *why* behind instructions rather than issuing bare MUST/NEVER commands
        - If bundled scripts exist, the skill should tell Claude when and how to use them

        ## Common pitfalls
        - Skills should not reference specific MCP tool names (e.g. `ha_rename_entity`,
          `ha_get_integration`) — tools change and vary by agent. Reference HA concepts and
          REST APIs instead.
        - Opinionated conventions (naming schemes, code style preferences) do not belong in
          this shared repo — they apply to any HA installation and will override each user's
          existing conventions. Flag any guidance that is not backed by official HA behaviour
          or well-established community consensus.

        ## Progressive disclosure
        Skills load in three levels: metadata (~100 words, always in context), SKILL.md body
        (in context when triggered), and bundled resources (loaded as needed). Keep the body
        lean — if approaching 500 lines, split content into references/ with clear pointers.
