name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
  push:
    branches: [main]
    paths:
      - 'skills/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for skill changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
          else
            base="$PUSH_BEFORE"
          fi
          if git diff --name-only "$base" HEAD | grep -q '^skills/'; then
            echo "skills_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "skills_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.changes.outputs.skills_changed == 'true'
        with:
          python-version: "3.12"

      - name: Install skills-ref
        if: steps.changes.outputs.skills_changed == 'true'
        run: pip install skills-ref

      - name: Validate all skills
        if: steps.changes.outputs.skills_changed == 'true'
        run: |
          exit_code=0
          for skill_dir in skills/*/; do
            echo "--- Validating ${skill_dir} ---"
            if ! python -m skills_ref.cli validate "$skill_dir"; then
              exit_code=1
            fi
          done
          exit $exit_code

      - name: Enforce version not manually changed
        if: steps.changes.outputs.skills_changed == 'true' && github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          exit_code=0
          changed_skills=$(git diff --name-only "$BASE_SHA" HEAD -- 'skills/' | cut -d'/' -f1-2 | sort -u)
          for skill_dir in $changed_skills; do
            skill_md="${skill_dir}/SKILL.md"
            if [ ! -f "$skill_md" ]; then
              continue
            fi
            head_version=$(awk '
              /^---/{fd++; next}
              fd==1 && /^metadata:/{m=1; next}
              fd==1 && m && /^[[:space:]]+version:/{match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH); exit}
            ' "$skill_md")
            base_version=$(git show "${BASE_SHA}:${skill_md}" 2>/dev/null | awk '
              /^---/{fd++; next}
              fd==1 && /^metadata:/{m=1; next}
              fd==1 && m && /^[[:space:]]+version:/{match($0,/[0-9]+/); print substr($0,RSTART,RLENGTH); exit}
            ' || true)
            if [ -z "$base_version" ]; then
              # New skill — must have placeholder version 0
              if [ -z "$head_version" ]; then
                echo "::error file=${skill_md}::New skill has no metadata.version field — add 'metadata:' and '  version: 0' to the frontmatter"
                exit_code=1
              elif [ "$head_version" != "0" ]; then
                echo "::error file=${skill_md}::New skill must set metadata.version to 0 (CI assigns the real version on merge)"
                exit_code=1
              else
                echo "OK: ${skill_md} is a new skill with placeholder version 0"
              fi
            elif [ "$head_version" != "$base_version" ]; then
              echo "::error file=${skill_md}::metadata.version was manually changed (${base_version} -> ${head_version}). Version is managed by CI — do not edit it."
              exit_code=1
            else
              echo "OK: ${skill_md} version unchanged (${head_version})"
            fi
          done
          exit $exit_code

      - name: No skill changes
        if: steps.changes.outputs.skills_changed == 'false'
        run: echo "No changes in skills/, skipping validation."
